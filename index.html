<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Flashcard JLPT N1 🌸</title>
    
    <!-- Cấu hình hiển thị mượt mà trên Mobile App -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="N1 Flashcard">

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root[data-theme="light"] {
            --bg-color: #F8FAF8;
            --card-bg: #FFFFFF;
            --text-color: #2D3436;
            --text-muted: #6C757D;
            --primary: #7CB59B;
            --primary-hover: #6CA389;
            --secondary: #A8DADC;
            --accent: #F4A261;
            --border-color: #E2E8F0;
            --blur-bg: #E2E8F0;
        }

        :root[data-theme="dark"] {
            --bg-color: #1F2937;
            --card-bg: #2D3748;
            --text-color: #F8F9FA;
            --text-muted: #CBD5E1;
            --primary: #9FD3C7;
            --primary-hover: #8BC2B6;
            --secondary: #8ECAE6;
            --accent: #F6BD60;
            --border-color: #4A5568;
            --blur-bg: #4A5568;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .header-row {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            margin-top: calc(env(safe-area-inset-top) + 5px);
        }
        h1.title { font-size: 24px; margin: 0; color: var(--primary); font-weight: bold; text-align: center; }
        
        .theme-toggle-btn {
            position: absolute;
            right: 0;
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            user-select: none;
        }

        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }

        .controls-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 10px; 
            background-color: var(--card-bg);
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .select-wrapper { display: flex; align-items: center; gap: 6px; flex: 1; }
        .select-wrapper label { font-size: 13px; font-weight: bold; color: var(--text-muted); white-space: nowrap; }
        select { width: 100%; background-color: transparent; color: var(--text-color); border: none; padding: 4px 0; font-size: 14px; outline: none; font-weight: 600; cursor: pointer; }
        
        .file-input-label {
            display: inline-flex;
            align-items: center;
            background-color: var(--primary);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }
        #excel-file { display: none; }

        .bookmark-filter { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; color: var(--text-muted); margin: -2px 0; cursor: pointer; font-weight: 500; }

        .mode-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .mode-btn { background-color: var(--card-bg); color: var(--text-muted); border: 1px solid var(--border-color); padding: 10px 2px; border-radius: 10px; font-size: 13px; cursor: pointer; font-weight: 600; text-align: center; }
        .mode-btn.active { background-color: var(--primary); color: white; border-color: var(--primary); }

        .flashcard { width: 100%; height: 350px; perspective: 1000px; margin: 2px 0; cursor: pointer; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.4s; transform-style: preserve-3d; -webkit-transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }
        
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 20px; padding: 25px 20px; box-sizing: border-box; background-color: var(--card-bg); border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .flashcard-front { display: flex; flex-direction: column; align-items: center; justify-content: center; transform: rotateY(0deg); -webkit-transform: rotateY(0deg); }
        .flashcard-back { color: var(--text-color); display: flex; flex-direction: column; align-items: center; justify-content: space-around; text-align: center; transform: rotateY(180deg); -webkit-transform: rotateY(180deg); overflow-y: auto; }
        
        .flashcard.flipped .flashcard-front { visibility: hidden; }
        .flashcard:not(.flipped) .flashcard-back { visibility: hidden; }

        .card-icon-top { position: absolute; top: 15px; font-size: 18px; cursor: pointer; z-index: 10; }
        .star-icon { left: 15px; }
        .eye-icon { right: 15px; font-size: 12px; color: var(--text-muted); font-weight: 500; }

        .word-main { font-size: 48px; font-weight: bold; margin: 0; color: var(--text-color); font-family: "Hiragino Mincho ProN", "Yu Mincho", serif; }
        .audio-btn { background: rgba(124, 181, 155, 0.15); border: none; color: var(--primary); border-radius: 50%; width: 32px; height: 32px; font-size: 13px; cursor: pointer; margin-left: 8px; display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }

        .fb-container-top { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; }
        .fb-hanviet { font-size: 24px; color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; margin: 0; }
        .fb-kana { font-size: 18px; color: var(--text-muted); font-weight: 500; margin: 0; display: flex; align-items: center; justify-content: center; }
        .fb-mean { font-size: 21px; font-weight: bold; margin: 4px 0; color: var(--text-color); }

        .blur-box { filter: blur(6px); background: var(--blur-bg); border-radius: 4px; padding: 2px 8px; cursor: pointer; color: transparent; display: inline-block; transition: filter 0.2s; }
        .blur-box.revealed { filter: none; background: transparent; color: inherit; }

        .nav-buttons { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; }
        .nav-btn { flex: 1; background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .nav-btn.btn-secondary { background-color: var(--secondary); color: var(--text-color); max-width: 90px; }
        .counter { font-size: 14px; color: var(--primary); font-weight: bold; text-align: center; margin: 2px 0; }

        footer { display: flex; justify-content: center; gap: 15px; font-size: 13px; margin-top: 4px; }
        footer a { color: var(--primary); text-decoration: none; font-weight: bold; }

        .score-board { display: flex; justify-content: flex-start; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        .quiz-question { font-size: 52px; font-weight: bold; text-align: center; margin-top: 15px; margin-bottom: 10px; color: var(--primary); font-family: "Hiragino Mincho ProN", serif; }
        .game-input { width: 100%; padding: 14px; font-size: 15px; background-color: var(--card-bg); border: 2px solid var(--primary); border-radius: 14px; outline: none; color: var(--text-color); box-sizing: border-box; margin-bottom: 12px; text-align: center; font-weight: 500; }

        .vocab-table-wrapper { max-height: 360px; overflow-y: auto; overflow-x: auto; border: 1px solid var(--border-color); border-radius: 12px; background: var(--card-bg); -webkit-overflow-scrolling: touch; }
        .vocab-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; white-space: nowrap; }
        .vocab-table th, .vocab-table td { padding: 12px 10px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        .vocab-table th { background: var(--primary); color: white; position: sticky; top: 0; z-index: 100; font-weight: 600; }

        .modal-overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 2000; 
            justify-content: center; 
            align-items: center; 
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
        }
        .modal-content { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 35px 24px 28px 24px; text-align: center; position: relative; width: 88%; max-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 2001; }
        .modal-close { position: absolute; top: 10px; right: 16px; font-size: 22px; cursor: pointer; color: var(--text-muted); }
        .modal-kanji { font-size: 56px; font-weight: bold; color: var(--primary); font-family: "Hiragino Mincho ProN", serif; }
        .modal-hanviet { margin-top: 8px; font-size: 16px; font-weight: bold; color: var(--accent); text-transform: uppercase; }
        .modal-kana { margin-top: 4px; font-size: 15px; color: var(--text-color); }
        .modal-meaning { margin-top: 8px; font-size: 18px; font-weight: 600; }
        .modal-divider { border: none; border-top: 1px dashed var(--border-color); margin: 16px 0; }
        .modal-example-jp { font-size: 15px; color: var(--text-color); line-height: 1.4; margin-bottom: 6px; }
        .modal-example-vi { font-size: 13px; color: var(--text-muted); line-height: 1.4; }

        @media only screen and (max-width: 430px) {
            body { padding: calc(10px + env(safe-area-inset-top)) 15px calc(15px + env(safe-area-inset-bottom)) 15px!important; }
            .flashcard { height: 340px !important; }
        }
    </style>
</head>
<body>

<div class="header-row">
    <h1 class="title">Flashcard JLPT N1 🌸</h1>
    <button id="theme-toggle" class="theme-toggle-btn" onclick="toggleTheme()">☀️</button>
</div>

<div class="container">
    <div class="controls-row">
        <div class="select-wrapper">
            <label>Bài học:</label>
            <select id="lesson-select" onchange="loadSheet()"></select>
        </div>
        <label for="excel-file" class="file-input-label">📥 Input data</label>
        <input type="file" id="excel-file" accept=".xlsx, .xls" onchange="handleExcelUpload(event)">
    </div>

    <label class="bookmark-filter">
        <input type="checkbox" id="only-bookmarked" onchange="toggleStarredFilter()"> ⭐ Từ cần chú ý
    </label>

    <div class="mode-buttons">
        <button class="mode-btn active" onclick="switchTab('tab-flashcard', this)">Flashcard</button>
        <button class="mode-btn" onclick="switchTab('tab-typing', this)">Gõ Từ</button>
        <button class="mode-btn" onclick="switchTab('tab-manager', this)">Xem Danh Sách</button>
    </div>

    <!-- TAB FLASHCARD -->
    <div id="tab-flashcard" class="tab-content" style="display: block;">
        <div class="flashcard" id="flashcard-container" onclick="flipCard()">
            <div class="flashcard-inner">
                <div class="flashcard-front">
                    <span class="card-icon-top star-icon" onclick="toggleStar(event)">☆</span>
                    <span class="card-icon-top eye-icon">👁️ 0</span>
                    <div class="word-main" id="fc-front-text">-</div>
                </div>
                
                <div class="flashcard-back">
                    <span class="card-icon-top star-icon" onclick="toggleStar(event)">☆</span>
                    <span class="card-icon-top eye-icon">👁️ 0</span>
                    
                    <div class="fb-container-top">
                        <div class="fb-hanviet" id="fc-hanviet">-</div>
                        <div class="fb-kana">
                            <span id="fc-kana"></span>
                            <button class="audio-btn" onclick="speakCurrentWord(event)">🔊</button>
                        </div>
                    </div>
                    
                    <div class="fb-mean" id="fc-meaning">-</div>
                    
                    <div style="font-size: 14px; color: var(--primary); margin: 5px 0; display:none;" id="fc-same-box">
                        Từ đồng nghĩa: <span class="blur-box" id="fc-same" onclick="revealBlur(event, this)"></span>
                    </div>
                    
                    <div style="font-size:14px; border-top:1px dashed var(--border-color); padding-top:12px; width:100%; display: flex; flex-direction: column; align-items: center; gap: 4px;" id="fc-ex-box">
                        <div style="font-weight:bold;">Ví dụ: <button class="audio-btn" onclick="speakCurrentExample(event)">🔊</button></div>
                        <span id="fc-ex-jp" style="font-style:italic; font-size:15px; color: var(--text-color);"></span>
                        <span style="color:var(--text-muted);">Dịch: <span class="blur-box" id="fc-ex-vi" onclick="revealBlur(event, this)"></span></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="prevCard()">&larr; Trước</button>
            <button class="nav-btn btn-secondary" onclick="shuffleCards()">🔀 Trộn</button>
            <button class="nav-btn" onclick="nextCard()">Tiếp &rarr;</button>
        </div>
        <div class="counter" id="card-counter">0 / 0</div>
        <footer>
            <a id="fc-gemini" href="#" target="_blank">🔍 Tra Gemini</a>
            <span style="color:var(--border-color)">|</span>
            <a id="fc-mazii" href="#" target="_blank">📖 Từ điển Mazii</a>
        </footer>
    </div>

    <!-- TAB GÕ TỪ -->
    <div id="tab-typing" class="tab-content" style="display: none;">
        <div class="score-board"><span>Điểm: <span id="type-score">0</span></span></div>
        <div class="quiz-question" id="type-q">-</div>
        <div style="text-align: center; font-size: 14px; font-weight: 500; color: var(--accent); margin-bottom: 20px;">
            Gợi ý ý nghĩa: <span id="type-hint" style="font-weight: 600;">-</span>
        </div>
        <input type="text" id="type-input" class="game-input" placeholder="Nhập cách đọc Hiragana/Kana..." onkeypress="checkTyping(event)">
        <button id="type-skip-btn" class="mode-btn" style="width: 100%; margin-top: 4px;" onclick="skipTyping()">Bỏ qua / Câu khác</button>
        <p id="type-feedback" style="text-align:center; font-weight:bold; font-size:14px; height:20px; margin: 6px 0;"></p>
    </div>

    <!-- TAB DANH SÁCH -->
    <div id="tab-manager" class="tab-content" style="display: none;">
        <h3 id="manager-title" style="margin:5px 0; font-size:14px; color:var(--primary);">Danh sách</h3>
        <div class="vocab-table-wrapper">
            <table class="vocab-table">
                <thead>
                    <tr>
                        <th>Dòng</th>
                        <th>⭐</th>
                        <th>👁️</th>
                        <th>Từ vựng</th>
                        <th>Hán Việt</th>
                        <th>Cách đọc</th>
                        <th>Ý nghĩa</th>
                    </tr>
                </thead>
                <tbody id="vocab-list-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- POPUP CHI TIẾT TỪ VỰNG -->
<div id="kanji-popup" class="modal-overlay" onclick="closeKanjiPopup()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeKanjiPopup()">&times;</span>
        <div id="modal-kanji-text" class="modal-kanji"></div>
        <div id="modal-hanviet-text" class="modal-hanviet"></div>
        <div id="modal-kana-text" class="modal-kana"></div>
        <div id="modal-meaning-text" class="modal-meaning"></div>
        <hr class="modal-divider">
        <div id="modal-example-jp" class="modal-example-jp"></div>
        <div id="modal-example-vi" class="modal-example-vi"></div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW fail:', err));
        });
    }

    (function() {
        const savedTheme = localStorage.getItem('app_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    })();

    // 🟢 HÀM KÍCH HOẠT VÀ ĐÁNH THỨC ÂM THANH TRÊN IPHONE (BẮT BUỘC)
    function unlockAudio() {
        try {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(' ');
            u.lang = 'ja-JP'; u.volume = 0;
            window.speechSynthesis.speak(u);
        } catch(e) { console.log(e); }
        window.removeEventListener('click', unlockAudio);
        window.removeEventListener('touchstart', unlockAudio);
    }
    window.addEventListener('click', unlockAudio);
    window.addEventListener('touchstart', unlockAudio);

    const KANJI_DICTIONARY = {
        "一":"NHẤT","二":"NHỊ","三":"TAM","四":"TỨ","五":"NGŨ","六":"LỤC","七":"THẤT","八":"BÁT","九":"CỬU","十":"THẬP",
        "大":"ĐẠI","小":"TIỂU","中":"TRUNG","国":"QUỐC","人":"NHÂN","年":"NIÊN","生":"SINH","学":"HỌC","会":"HỘI","社":"XÃ"
    };

    let db = JSON.parse(localStorage.getItem('jlpt_kanji_db')) || {
        "N1_Mondai_Demo": [
            { kanji: "圧倒的", kana: "あっとうてき", meaning: "Một cách áp đảo, vượt trội", exampleJp: "圧倒的な強さで優勝した。", exampleVi: "Giành chiến thắng nhờ sức mạnh áp đảo.", synonym: "優勢", flipCount: 0, starred: false },
            { kanji: "示唆", kana: "しさ", meaning: "Ám thị, khơi gợi, gợi ý", exampleJp: "彼の発言は多くのことを示唆している。", exampleVi: "Phát ngôn của anh ấy gợi ý rất nhiều điều.", synonym: "", flipCount: 0, starred: false }
        ]
    };
    let currentList = [], activeWordIndex = 0, currentSheetName = "";

    window.onload = () => { 
        updateThemeToggleIcon();
        initSheetSelect(); 
        // Gọi nạp danh sách giọng nói sớm để tránh trễ giọng đọc của iOS
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {};
        }
    };

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('app_theme', newTheme);
        updateThemeToggleIcon();
    }

    function updateThemeToggleIcon() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        document.getElementById('theme-toggle').innerText = currentTheme === 'light' ? '🌙' : '☀️';
    }

    function autoTranslateHanViet(text, customDb) {
        if (!text) return "";
        const activeDb = customDb || db;
        if (activeDb['_amHanViet'] && activeDb['_amHanViet'][text]) return activeDb['_amHanViet'][text];
        let result = [];
        for (let char of text) {
            if (/[\u4e00-\u9faf]/.test(char)) {
                if (activeDb['_amHanViet'] && activeDb['_amHanViet'][char]) result.push(activeDb['_amHanViet'][char]);
                else result.push(KANJI_DICTIONARY[char] || char);
            }
        }
        return result.length > 0 ? result.join(" ") : "";
    }

    function initSheetSelect() {
        const select = document.getElementById('lesson-select'); select.innerHTML = '';
        for (const sheet in db) {
            if (sheet === '_amHanViet') continue;
            let opt = document.createElement('option'); opt.value = sheet; opt.innerHTML = sheet; select.appendChild(opt);
        }
        loadSheet();
    }

    function handleExcelUpload(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const newDb = {};

                if (workbook.SheetNames.includes('AmHanViet')) {
                    const worksheet = workbook.Sheets['AmHanViet'];
                    let rowIndex = 2; let emptyStreak = 0; const amHanVietMap = {};
                    while (emptyStreak < 30) {
                        const cellA = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 0})];
                        const valA = cellA && cellA.v !== undefined ? String(cellA.v).trim() : "";
                        if (valA) {
                            emptyStreak = 0;
                            const cellB = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 1})];
                            const valB = cellB && cellB.v !== undefined ? String(cellB.v).trim() : "";
                            if (valB) amHanVietMap[valA] = valB.toUpperCase();
                        } else { emptyStreak++; }
                        rowIndex++;
                    }
                    newDb['_amHanViet'] = amHanVietMap;
                } else if (db['_amHanViet']) {
                    newDb['_amHanViet'] = db['_amHanViet'];
                }

                workbook.SheetNames.forEach(sheetName => {
                    if (sheetName === 'AmHanViet') return;
                    const worksheet = workbook.Sheets[sheetName]; const sheetData = [];
                    let rowIndex = 2; let emptyStreak = 0;
                    while (emptyStreak < 30) {
                        const cellA = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 0})];
                        const valA = cellA && cellA.v !== undefined ? String(cellA.v).trim() : "";
                        if (valA) {
                            emptyStreak = 0;
                            const cellB = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 1})];
                            const cellC = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 2})];
                            const cellD = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 3})];
                            const cellE = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 4})];
                            const cellF = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 5})];
                            const cellG = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 6})];
                            let hv = cellG && cellG.v !== undefined ? String(cellG.v).trim() : "";
                            if (!hv) hv = autoTranslateHanViet(valA, newDb);
                            sheetData.push({
                                kanji: valA, kana: cellB && cellB.v !== undefined ? String(cellB.v).trim() : "",
                                meaning: cellC && cellC.v !== undefined ? String(cellC.v).trim() : "",
                                exampleJp: cellD && cellD.v !== undefined ? String(cellD.v).trim() : "",
                                exampleVi: cellE && cellE.v !== undefined ? String(cellE.v).trim() : "",
                                synonym: cellF && cellF.v !== undefined ? String(cellF.v).trim() : "",
                                hanviet: hv, flipCount: 0, starred: false
                            });
                        } else { emptyStreak++; }
                        rowIndex++;
                    }
                    if (sheetData.length > 0) newDb[sheetName] = sheetData;
                });

                if (Object.keys(newDb).filter(k => k !== '_amHanViet').length > 0) {
                    db = newDb; saveToLocalStorage(); alert("📥 Data đã được nạp và đồng bộ!"); initSheetSelect();
                } else { alert("Lỗi định dạng dữ liệu tệp!"); }
            } catch (err) { alert("Lỗi: " + err.message); }
        };
        reader.readAsArrayBuffer(file);
    }

    function loadSheet() {
        const selectVal = document.getElementById('lesson-select').value;
        currentSheetName = selectVal || Object.keys(db).filter(k => k !== '_amHanViet')[0];
        if (!currentSheetName) return;
        document.getElementById('only-bookmarked').checked = false;
        currentList = (db[currentSheetName] || []).map(w => { w.hanviet = autoTranslateHanViet(w.kanji); return w; });
        activeWordIndex = 0; updateFlashcard(); initTyping();
        if(document.getElementById('tab-manager').style.display === 'block') { renderManagerList(); }
    }

    function saveToLocalStorage() { localStorage.setItem('jlpt_kanji_db', JSON.stringify(db)); }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).style.display = 'block';
        if(btn) btn.classList.add('active');
        if(tabId === 'tab-manager') renderManagerList();
        if(tabId === 'tab-typing') initTyping();
    }

    function updateFlashcard() {
        if(currentList.length === 0) { document.getElementById('fc-front-text').innerText = "Trống"; return; }
        const word = currentList[activeWordIndex];
        document.getElementById('fc-front-text').innerText = word.kanji;
        
        const views = `👁️ ${word.flipCount || 0}`;
        document.querySelectorAll('.eye-icon').forEach(el => { el.innerText = views; });
        updateStarUI();

        document.getElementById('fc-hanviet').innerText = word.hanviet || autoTranslateHanViet(word.kanji);
        document.getElementById('fc-kana').innerText = word.kana ? `[ ${word.kana} ]` : '';
        document.getElementById('fc-meaning').innerText = word.meaning;

        const sameBox = document.getElementById('fc-same-box');
        if (word.synonym) { document.getElementById('fc-same').innerText = word.synonym; sameBox.style.display = 'block'; } else { sameBox.style.display = 'none'; }

        const exBox = document.getElementById('fc-ex-box');
        if (word.exampleJp) {
            document.getElementById('fc-ex-jp').innerText = word.exampleJp;
            document.getElementById('fc-ex-vi').innerText = word.exampleVi || '';
            exBox.style.display = 'flex';
        } else { exBox.style.display = 'none'; }

        document.getElementById('card-counter').innerText = `${activeWordIndex + 1} / ${currentList.length}`;
        document.getElementById('flashcard-container').classList.remove('flipped');
        
        document.getElementById('fc-gemini').href = `https://gemini.google.com/?q=Phân tích từ vựng N1: "${word.kanji}"`;
        document.getElementById('fc-mazii').href = `https://mazii.net/vi-VN/search/word/ja/${encodeURIComponent(word.kanji)}`;
    }

    function flipCard() {
        const card = document.getElementById('flashcard-container');
        if (card.classList.toggle('flipped') && currentList.length > 0) {
            currentList[activeWordIndex].flipCount = (currentList[activeWordIndex].flipCount || 0) + 1;
            saveToLocalStorage();
            document.querySelectorAll('.eye-icon').forEach(el => el.innerText = `👁️ ${currentList[activeWordIndex].flipCount}`);
        }
    }

    function nextCard() { if(currentList.length === 0) return; if(activeWordIndex < currentList.length - 1) activeWordIndex++; else activeWordIndex = 0; updateFlashcard(); }
    function prevCard() { if(currentList.length === 0) return; if(activeWordIndex > 0) activeWordIndex--; else activeWordIndex = currentList.length - 1; updateFlashcard(); }
    function shuffleCards() { if(currentList.length === 0) return; currentList.sort(() => Math.random() - 0.5); activeWordIndex = 0; updateFlashcard(); }
    
    function toggleStar(e) { e.stopPropagation(); if(!currentList[activeWordIndex]) return; currentList[activeWordIndex].starred = !currentList[activeWordIndex].starred; saveToLocalStorage(); updateStarUI(); }
    function updateStarUI() {
        const word = currentList[activeWordIndex]; if(!word) return;
        document.querySelectorAll('.star-icon').forEach(el => { 
            el.innerText = word.starred ? "⭐" : "☆"; 
            el.style.color = word.starred ? "#ffc107" : ""; 
        });
    }
    
    function toggleStarredFilter() {
        const full = db[currentSheetName] || [];
        currentList = document.getElementById('only-bookmarked').checked ? full.filter(w => w.starred) : [...full];
        if(currentList.length === 0) { alert("Chưa có thẻ đánh dấu!"); document.getElementById('only-bookmarked').checked = false; currentList = [...full]; }
        activeWordIndex = 0; updateFlashcard();
    }

    // 🟢 HÀM PHÁT ÂM THANH ƯU TIÊN GIỌNG SIRI TRÊN IPHONE
    function speakJapaneseText(e, text) { 
        if(e) e.stopPropagation(); 
        if(!text) return;

        // Giải phóng và xóa bộ nhớ đệm âm thanh cũ của iOS trước khi phát
        window.speechSynthesis.cancel(); 

        const u = new SpeechSynthesisUtterance(text); 
        u.lang = 'ja-JP'; 
        u.rate = 0.88; // Tốc độ chuẩn đọc tiếng Nhật học tập

        // Tìm kiếm các nguồn giọng nói chất lượng cao hoặc Siri cài trên iPhone
        if (typeof speechSynthesis !== 'undefined') {
            const voices = speechSynthesis.getVoices();
            // Lọc giọng nói tiếng Nhật
            const jaVoices = voices.filter(v => v.lang.startsWith('ja'));
            
            // Tìm kiếm giọng đọc cao cấp của hệ thống Apple (Otoya Premium hoặc Siri)
            const siriVoice = jaVoices.find(v => v.name.includes('Otoya') || v.name.includes('Siri') || v.name.includes('Premium'));
            
            if (siriVoice) {
                u.voice = siriVoice;
            } else if (jaVoices.length > 0) {
                u.voice = jaVoices[0]; // Phương án dự phòng giọng tiếng Nhật mặc định
            }
        }

        window.speechSynthesis.speak(u); 
    }
    
    function speakCurrentWord(e) { const w = currentList[activeWordIndex]; speakJapaneseText(e, w.kana || w.kanji); }
    function speakCurrentExample(e) { speakJapaneseText(e, currentList[activeWordIndex].exampleJp); }
    function revealBlur(e, el) { e.stopPropagation(); el.classList.toggle('revealed'); }

    let typeScore = 0, typeCurrent = null;
    
    function initTyping() { 
        typeScore = 0; 
        document.getElementById('type-score').innerText = typeScore; 
        loadNextType(); 
    }
    
    function loadNextType() { 
        if (currentList.length === 0) return;
        let kanjiOnlyList = currentList.filter(w => /[\u4e00-\u9faf]/.test(w.kanji));
        if (kanjiOnlyList.length === 0) kanjiOnlyList = currentList;
        if (kanjiOnlyList.length === 0) {
            document.getElementById('type-q').innerText = "Trống";
            document.getElementById('type-hint').innerText = "-";
            return;
        }
        
        typeCurrent = kanjiOnlyList[Math.floor(Math.random() * kanjiOnlyList.length)]; 
        document.getElementById('type-q').innerText = typeCurrent.kanji; 
        document.getElementById('type-hint').innerText = typeCurrent.meaning;
        
        const i = document.getElementById('type-input'); 
        i.value = ''; 
        i.disabled = false; 
        document.getElementById('type-feedback').innerText = ''; 
        i.focus(); 
    }
    
    function checkTyping(e) { 
        if (e.key === 'Enter') { 
            const i = document.getElementById('type-input'); 
            const v = i.value.trim().toLowerCase(); 
            if (!v) return;
            
            i.disabled = true; 
            if (v === typeCurrent.kana.toLowerCase()) { 
                typeScore += 10; 
                document.getElementById('type-score').innerText = typeScore; 
                document.getElementById('type-feedback').style.color = 'var(--primary)'; 
                document.getElementById('type-feedback').innerText = 'Chính xác! 🎉'; 
                setTimeout(loadNextType, 1000); 
            } else { 
                document.getElementById('type-feedback').style.color = 'var(--accent)'; 
                document.getElementById('type-feedback').innerText = `Sai rồi! Đáp án: ${typeCurrent.kana}`; 
                setTimeout(loadNextType, 2000); 
            } 
        } 
    }

    function skipTyping() {
        if (!typeCurrent) return;
        document.getElementById('type-feedback').style.color = 'var(--text-muted)';
        document.getElementById('type-feedback').innerText = `Đáp án: ${typeCurrent.kana}`;
        document.getElementById('type-input').disabled = true;
        setTimeout(loadNextType, 1500);
    }

    function renderManagerList() {
        document.getElementById('manager-title').innerText = `Bài học: ${currentSheetName}`;
        const tbody = document.getElementById('vocab-list-tbody'); tbody.innerHTML = '';
        const listData = db[currentSheetName] || [];
        listData.forEach((w, index) => {
            let tr = document.createElement('tr');
            tr.onclick = () => showKanjiPopup(index);
            tr.innerHTML = `
                <td>${index + 2}</td>
                <td onclick="event.stopPropagation(); toggleStarFromList(${index})">${w.starred ? '⭐' : '☆'}</td>
                <td>${w.flipCount || 0}</td>
                <td style="font-weight: bold; color: var(--primary); text-decoration: underline dotted;">${w.kanji}</td>
                <td style="color: var(--accent); font-weight: bold; text-transform: uppercase;">${w.hanviet || autoTranslateHanViet(w.kanji)}</td>
                <td>${w.kana || '---'}</td>
                <td style="max-width: 150px; overflow: hidden; text-overflow: ellipsis;">${w.meaning}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function toggleStarFromList(index) {
        const listData = db[currentSheetName] || [];
        if (listData[index]) {
            listData[index].starred = !listData[index].starred;
            saveToLocalStorage();
            renderManagerList();
            updateFlashcard();
        }
    }

    function showKanjiPopup(index) {
        const listData = db[currentSheetName] || [];
        const word = listData[index]; if (!word) return;
        document.getElementById('modal-kanji-text').innerText = word.kanji;
        document.getElementById('modal-hanviet-text').innerText = word.hanviet || autoTranslateHanViet(word.kanji);
        document.getElementById('modal-kana-text').innerText = word.kana ? `[ ${word.kana} ]` : '';
        document.getElementById('modal-meaning-text').innerText = word.meaning;
        if (word.exampleJp) {
            document.getElementById('modal-example-jp').innerText = word.exampleJp;
            document.getElementById('modal-example-vi').innerText = word.exampleVi || '';
        } else {
            document.getElementById('modal-example-jp').innerText = 'Chưa cập nhật ví dụ.';
            document.getElementById('modal-example-vi').innerText = '';
        }
        document.getElementById('kanji-popup').style.display = 'flex';
    }

    function closeKanjiPopup() { document.getElementById('kanji-popup').style.display = 'none'; }
</script>
